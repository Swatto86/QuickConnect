name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build

      - name: Stage portable exe
        shell: pwsh
        run: |
          $ver = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version
          $exe = Get-ChildItem 'src-tauri/target/release/*.exe' -File -ErrorAction SilentlyContinue |
                 Where-Object { $_.Name -notlike '*setup*' } |
                 Sort-Object Length -Descending | Select-Object -First 1
          if (-not $exe) { throw 'No portable exe in src-tauri/target/release' }
          New-Item -ItemType Directory -Force portable | Out-Null
          $dest = "portable/QuickConnect_${ver}_x64-portable.exe"
          Copy-Item $exe.FullName $dest -Force
          Write-Host "Staged $dest ($([math]::Round($exe.Length/1MB,1)) MB)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            portable/*.exe
          draft: false
          prerelease: false
          name: QuickConnect ${{ github.ref_name }}
          body: |
            ## QuickConnect ${{ github.ref_name }}
            
            Download the installer for Windows:
            - **NSIS Installer** (.exe) - Recommended
            - **MSI Installer** (.msi) - Alternative
            
            See the [README](https://github.com/Swatto86/QuickConnect/blob/main/README.md) for installation instructions.
